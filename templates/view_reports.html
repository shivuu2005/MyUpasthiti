<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reports</title>
    <style>
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        table th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <h1>View Reports</h1>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>User ID</th>
                <th>Name</th>
                <th>Enrollment Number</th>
                <th>Date</th>
                <th>Problem Type</th>
                <th>Message</th>
            </tr>
        </thead>
        <tbody>
            {% for report in reports %}
            <tr>
                <td>{{ report.id }}</td>
                <td>{{ report.user_id }}</td>
                <td>{{ report.name }}</td>
                <td>{{ report.enrollment_number }}</td>
                <td>{{ report.date }}</td>
                <td>{{ report.problem_type }}</td>
                <td>{{ report.message }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <br>

    <a href="{{ url_for('admin_dashboard') }}">
        <button>Back to Dashboard</button>
    </a>
</body>
</html>
